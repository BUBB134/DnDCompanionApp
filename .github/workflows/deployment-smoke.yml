name: Deployment Smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target:
        description: Deployed environment to validate
        required: true
        type: choice
        options:
          - preview
          - production
      deployment_url:
        description: Vercel deployment URL to validate
        required: true
        type: string

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_url || github.event.deployment_status.environment_url }}
      EXPECTED_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.target || github.event.deployment.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check deployment health
        shell: bash
        run: |
          expected_environment="$(printf '%s' "$EXPECTED_ENVIRONMENT" | tr '[:upper:]' '[:lower:]')"
          npm run deploy:check -- --url="$DEPLOYMENT_URL" --expect-env="$expected_environment"
