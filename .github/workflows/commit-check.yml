name: Commit message check

on:
  pull_request:

jobs:
  commit-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Check commit messages
        shell: bash
        run: |
          BASE_BRANCH="origin/${{ github.base_ref }}"
          COMMITS="$(git log --no-merges --format=%s "$BASE_BRANCH..HEAD")"

          if [[ -z "$COMMITS" ]]; then
            echo "No non-merge pull request commits found to validate."
            exit 0
          fi

          while IFS= read -r line; do
            if [[ ! $line =~ ^\[DND-[0-9]+\]\ .+ ]]; then
              echo "Commit message missing [DND-123] prefix: $line"
              exit 1
            fi
          done <<< "$COMMITS"

          echo "Commit messages valid."
