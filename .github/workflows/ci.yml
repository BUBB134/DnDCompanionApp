name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy_supabase:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: supabase-production
      cancel-in-progress: false

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_CONNECTION_TIMEOUT_MS: 10000
      DATABASE_IDLE_TIMEOUT_MS: 30000
      DATABASE_POOL_MAX: 5
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      # --- Supabase deploy steps ---
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push DB migrations
        run: npm run db:migrate:supabase

      - name: Deploy Edge Functions
        run: |
          if [ ! -d supabase/functions ]; then
            echo "No Supabase Edge Functions found; skipping deploy."
            exit 0
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN is required to deploy Edge Functions."
            exit 1
          fi

          if [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "SUPABASE_PROJECT_ID is required to deploy Edge Functions."
            exit 1
          fi

          supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
